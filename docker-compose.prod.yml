services:
  app:
    image: ${IMAGE_TAG:-petrescue-api:latest}
    container_name: petrescue-api

    ports:
      - "${PORT:-8080}:8080"

    environment:
      SPRING_PROFILES_ACTIVE: production

      SERVER_PORT: ${PORT:-8080}

      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Securitys
      JWT_SECRET: ${JWT_SECRET}

      # CORS
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://pet-rescue-community.vercel.app}

      # Redis Cloud
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL_ENABLED: ${REDIS_SSL_ENABLED:-false}

      # RabbitMQ CloudAMQP
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_SSL_ENABLED: ${RABBITMQ_SSL_ENABLED:-true}

      # Email
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_VERIFICATION_URL: ${EMAIL_VERIFICATION_URL}

      # SMTP
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_STARTTLS_ENABLE: ${SPRING_MAIL_STARTTLS_ENABLE:-true}
      SPRING_MAIL_STARTTLS_REQUIRED: ${SPRING_MAIL_STARTTLS_REQUIRED:-true}

      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
        -XX:TieredStopAtLevel=1

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 512M